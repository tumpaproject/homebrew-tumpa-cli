name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA_AARCH64_APPLE_DARWIN: ${{ github.event.client_payload.sha256.aarch64_apple_darwin }}
          SHA_X86_64_APPLE_DARWIN: ${{ github.event.client_payload.sha256.x86_64_apple_darwin }}
          SHA_X86_64_UNKNOWN_LINUX_GNU: ${{ github.event.client_payload.sha256.x86_64_unknown_linux_gnu }}
        run: |
          echo "Updating formula to v${VERSION}"
          ruby <<'RUBY'
          path = 'Formula/tumpa-cli.rb'
          content = File.read(path)

          version = ENV.fetch('VERSION')
          shas = {
            'aarch64-apple-darwin'     => ENV.fetch('SHA_AARCH64_APPLE_DARWIN'),
            'x86_64-apple-darwin'      => ENV.fetch('SHA_X86_64_APPLE_DARWIN'),
            'x86_64-unknown-linux-gnu' => ENV.fetch('SHA_X86_64_UNKNOWN_LINUX_GNU'),
          }

          raise "empty VERSION"               if version.empty?
          shas.each { |k, v| raise "empty sha256 for #{k}" if v.nil? || v.empty? }

          # Version is inferred by Homebrew from the /v<version>/ segment
          # in the release URL, so we only rewrite URLs and SHAs here.
          content.gsub!(%r{/download/v[^/]+/tumpa-cli-}, "/download/v#{version}/tumpa-cli-") \
            or raise "no release URL found in formula"

          shas.each do |triple, sha|
            replaced = content.sub!(
              /(url\s+"[^"]*tumpa-cli-#{Regexp.escape(triple)}\.tar\.gz"\s*\n\s*sha256\s+)"[^"]*"/,
              "\\1\"#{sha}\"",
            )
            raise "url/sha256 block for #{triple} not found" unless replaced
          end

          File.write(path, content)
          RUBY

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Update tumpa-cli to v${{ github.event.client_payload.version }}"
          body: |
            Automated update triggered by [tumpa-cli release](https://github.com/tumpaproject/tumpa-cli/releases/tag/v${{ github.event.client_payload.version }}).

            - Version: `${{ github.event.client_payload.version }}`
            - aarch64-apple-darwin: `${{ github.event.client_payload.sha256.aarch64_apple_darwin }}`
            - x86_64-apple-darwin: `${{ github.event.client_payload.sha256.x86_64_apple_darwin }}`
            - x86_64-unknown-linux-gnu: `${{ github.event.client_payload.sha256.x86_64_unknown_linux_gnu }}`
          branch: "update-v${{ github.event.client_payload.version }}"
          commit-message: "Update tumpa-cli to v${{ github.event.client_payload.version }}"
